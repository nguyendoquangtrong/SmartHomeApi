version: '3.8'

services:
  # 1. Cơ sở dữ liệu PostgreSQL
  postgres_db:
    image: postgres:15-alpine
    container_name: smarthome_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: SmartHomeDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Giao diện Web để quản lý PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: smarthome_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smarthome.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres_db

  # 3. Máy chủ trung gian MQTT Mosquitto
  mosquitto_broker:
    image: eclipse-mosquitto:latest
    container_name: smarthome_mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto_config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto_config/pwfile:/mosquitto/config/pwfile
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log: